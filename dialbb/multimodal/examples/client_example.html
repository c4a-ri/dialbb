<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mm_client WebSocket Client (FastAPI)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 20px;
        }
        h1 {
            margin-top: 0;
            color: #333;
        }
        .session-setup {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        input[type="text"], input[type="url"] {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            padding: 8px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #0056b3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .status {
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .status.connected {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status.connecting {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        .chat-area {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            height: 300px;
            overflow-y: auto;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 13px;
            font-family: "Courier New", monospace;
        }
        .message {
            margin-bottom: 8px;
            padding: 8px;
            border-radius: 4px;
        }
        .message.user {
            background: #e3f2fd;
            color: #1565c0;
            text-align: right;
        }
        .message.system {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .message.error {
            background: #ffebee;
            color: #c62828;
        }
        .input-area {
            display: flex;
            gap: 8px;
        }
        input[type="text"].message-input {
            flex: 1;
        }
        .buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .buttons button {
            flex: 1;
        }
        .info {
            background: #f0f0f0;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            color: #666;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>mm_client WebSocket Client</h1>
        <p>FastAPI サーバとのリアルタイム対話デモ</p>
        
        <div class="session-setup">
            <input type="text" id="sessionId" placeholder="Session ID (or auto-create)" value="">
            <input type="url" id="serverUrl" placeholder="ws://localhost:5000" value="ws://localhost:5000">
            <button id="createBtn" onclick="createSession()">作成</button>
            <button id="connectBtn" onclick="connect()" disabled>接続</button>
        </div>
        
        <div id="status" class="status disconnected">状態: 未接続</div>
        
        <div class="chat-area" id="chatArea"></div>
        
        <div class="input-area">
            <input type="text" id="messageInput" class="message-input" placeholder="メッセージを入力..." disabled>
            <button id="sendBtn" onclick="sendMessage()" disabled>送信</button>
        </div>
        
        <div class="buttons">
            <button id="startBtn" onclick="startDialogue()" disabled>対話開始</button>
            <button id="endBtn" onclick="endDialogue()" disabled>対話終了</button>
            <button id="closeBtn" onclick="closeConnection()" disabled>切断</button>
        </div>
        
        <div class="info">
            <strong>使用方法:</strong><br>
            1. 「作成」でセッション ID を生成するか、既存の ID を入力<br>
            2. 「接続」で WebSocket サーバに接続<br>
            3. 「対話開始」で会話を開始<br>
            4. メッセージを入力して「送信」
        </div>
    </div>

    <script>
        let socket = null;
        let sessionId = '';

        function log(message, type = 'system') {
            const chatArea = document.getElementById('chatArea');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            chatArea.appendChild(msg);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function updateStatus(connected) {
            const status = document.getElementById('status');
            if (connected) {
                status.className = 'status connected';
                status.textContent = `✓ 接続済み (Session: ${sessionId})`;
                document.getElementById('messageInput').disabled = false;
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('startBtn').disabled = false;
                document.getElementById('closeBtn').disabled = false;
                document.getElementById('connectBtn').disabled = true;
            } else {
                status.className = 'status disconnected';
                status.textContent = '✗ 未接続';
                document.getElementById('messageInput').disabled = true;
                document.getElementById('sendBtn').disabled = true;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('endBtn').disabled = true;
                document.getElementById('closeBtn').disabled = true;
                document.getElementById('connectBtn').disabled = false;
            }
        }

        async function createSession() {
            const serverUrl = document.getElementById('serverUrl').value || 'http://localhost:5000';
            try {
                const resp = await fetch(`${serverUrl}/sessions`, { method: 'POST' });
                const data = await resp.json();
                sessionId = data.session_id;
                document.getElementById('sessionId').value = sessionId;
                document.getElementById('connectBtn').disabled = false;
                log(`✓ Session created: ${sessionId}`);
            } catch (error) {
                log(`✗ Failed to create session: ${error.message}`, 'error');
            }
        }

        function connect() {
            sessionId = document.getElementById('sessionId').value.trim();
            if (!sessionId) {
                log('✗ Session ID is required', 'error');
                return;
            }

            const serverUrl = document.getElementById('serverUrl').value || 'ws://localhost:5000';
            const wsUrl = `${serverUrl}/dialogue/ws/${sessionId}`;

            log(`Connecting to ${wsUrl}...`);
            document.getElementById('status').className = 'status connecting';
            document.getElementById('status').textContent = '⏳ 接続中...';

            socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                log('✓ WebSocket connected');
                updateStatus(true);
            };

            socket.onmessage = (event) => {
                const message = JSON.parse(event.data);
                
                if (message.event === 'dialogue_event') {
                    const { event_type, data } = message.payload;
                    log(`Server: ${event_type} - ${JSON.stringify(data)}`, 'system');
                } else if (message.event === 'joined_session') {
                    log(`✓ Joined session: ${message.payload.session_id}`);
                } else if (message.event === 'error') {
                    log(`✗ Error: ${message.payload.message}`, 'error');
                } else {
                    log(`Event: ${message.event}`, 'system');
                }
            };

            socket.onerror = (error) => {
                log(`✗ WebSocket error: ${error}`, 'error');
                updateStatus(false);
            };

            socket.onclose = () => {
                log('✗ WebSocket closed');
                updateStatus(false);
                socket = null;
            };
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !socket) return;

            log(`You: ${text}`, 'user');
            socket.send(JSON.stringify({
                action: 'send_text_utterance',
                text: text
            }));
            input.value = '';
        }

        function startDialogue() {
            if (!socket) return;
            socket.send(JSON.stringify({ action: 'start_dialogue' }));
            log('Dialogue started');
            document.getElementById('endBtn').disabled = false;
        }

        function endDialogue() {
            if (!socket) return;
            socket.send(JSON.stringify({ action: 'end_dialogue' }));
            log('Dialogue ended');
            document.getElementById('endBtn').disabled = true;
        }

        function closeConnection() {
            if (socket) {
                socket.close();
            }
        }

        // Enter key で送信
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
